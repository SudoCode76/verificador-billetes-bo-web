<header class="app-nav">
  <div class="brand">
    <div class="brand-icon">
      <img src="/assets/icon.png" alt="Verificador BO" class="w-8 h-8 rounded-lg object-contain" />
    </div>
    <span class="brand-name">{{ brandName }}</span>
  </div>

  <button
    type="button"
    class="mobile-toggle"
    [attr.aria-expanded]="menuOpen()"
    aria-label="Alternar navegación"
    (click)="toggleMenu()"
  >
    <span class="material-symbols-outlined">{{ menuOpen() ? 'close' : 'menu' }}</span>
  </button>

  <nav class="nav-links" [class.open]="menuOpen()">
    @for (link of links; track link.href) {
      @if (link.href.startsWith('/')) {
        <a [routerLink]="link.href" (click)="closeMenu()">{{ link.label }}</a>
      } @else {
        <a [href]="link.href" (click)="closeMenu()">{{ link.label }}</a>
      }
    }
  </nav>

  <div class="nav-actions">
    <button
      type="button"
      class="theme-toggle"
      (click)="toggleTheme()"
      [attr.aria-label]="theme() === 'dark' ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'"
    >
      <span class="material-symbols-outlined">{{
        theme() === 'dark' ? 'light_mode' : 'dark_mode'
      }}</span>
    </button>

    <a class="download-btn" [href]="ctaHref">
      <span class="material-symbols-outlined">android</span>
      {{ ctaLabel }}
    </a>
  </div>
</header>
